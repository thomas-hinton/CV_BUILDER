<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder — Mon CV</title>
    <link rel="icon" href="/assets/logo.png" type="image/png">
    <link rel="stylesheet" href="/css/index.css">
    <script src="/js/admin.js" defer></script>
    <style>
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .topbar h1 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--primary);
        }

        .btn-logout {
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .btn-logout:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

        .page-content {
            max-width: 860px;
            margin: 32px auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            margin: 0 0 20px;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            color: var(--text);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 20px;
        }

        .form-full { grid-column: 1 / -1; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="tel"],
        .form-group input[type="date"],
        .form-group textarea {
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus { border-color: var(--primary); }

        .form-group textarea { resize: vertical; min-height: 70px; }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
        }

        .checkbox-group label { font-size: 0.92rem; cursor: pointer; margin: 0; }
        .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

        .btn-primary {
            padding: 10px 22px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-delete {
            padding: 5px 12px;
            background: transparent;
            border: 1px solid #fecaca;
            border-radius: 6px;
            color: #dc2626;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .btn-delete:hover { background: #fef2f2; }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.93rem;
            gap: 10px;
        }

        .list-item span { flex: 1; }

        .empty { color: var(--muted); font-size: 0.9rem; font-style: italic; }

        .msg {
            display: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-top: 10px;
        }

        .msg-ok    { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
        .msg-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }

        .info-text {
            font-size: 0.88rem;
            color: var(--muted);
            margin: -10px 0 14px;
        }

        .section-status {
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 14px;
            font-style: italic;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <!-- Top bar -->
    <div class="topbar">
        <h1>CV Builder</h1>
        <button id="btn-logout" class="btn-logout">Se déconnecter</button>
    </div>

    <div class="page-content">

        <!-- ---- Profil ---- -->
        <div class="card">
            <h2>Informations personnelles</h2>
            <p id="profile-status" class="section-status"></p>
            <p id="profile-slug-info" class="info-text"></p>

            <form id="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="f-nom">Nom *</label>
                        <input type="text" id="f-nom" required maxlength="50" placeholder="Hinton">
                    </div>
                    <div class="form-group">
                        <label for="f-prenom">Prénom *</label>
                        <input type="text" id="f-prenom" required maxlength="50" placeholder="Thomas">
                    </div>
                    <div class="form-group">
                        <label for="f-email">Email public</label>
                        <input type="email" id="f-email" placeholder="thomas@email.com">
                    </div>
                    <div class="form-group">
                        <label for="f-tel">Téléphone (10 chiffres)</label>
                        <input type="tel" id="f-tel" placeholder="0612345678" maxlength="10">
                    </div>
                    <div class="form-group form-full">
                        <label for="f-adresse">Adresse</label>
                        <input type="text" id="f-adresse" placeholder="Paris, France">
                    </div>
                </div>

                <hr class="divider">

                <div class="checkbox-group">
                    <input type="checkbox" id="f-is-public">
                    <label for="f-is-public">Rendre mon CV public (accessible via l'URL /cv/...)</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="f-show-email">
                    <label for="f-show-email">Afficher mon email sur le CV public</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="f-show-phone">
                    <label for="f-show-phone">Afficher mon téléphone sur le CV public</label>
                </div>

                <button type="submit" id="btn-save-profile" class="btn-primary" data-label="Enregistrer">Enregistrer</button>
                <div id="profile-msg" class="msg"></div>
            </form>
        </div>

        <!-- ---- Formations ---- -->
        <div class="card">
            <h2>Formations</h2>
            <div id="formations-list"></div>

            <hr class="divider">
            <form id="formation-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fo-nom">Intitulé de la formation *</label>
                        <input type="text" id="fo-nom" required maxlength="50" placeholder="BTS Informatique">
                    </div>
                    <div class="form-group">
                        <label for="fo-organisme">Établissement *</label>
                        <input type="text" id="fo-organisme" required maxlength="50" placeholder="Lycée X">
                    </div>
                    <div class="form-group">
                        <label for="fo-date-debut">Date de début *</label>
                        <input type="date" id="fo-date-debut" required>
                    </div>
                    <div class="form-group">
                        <label for="fo-date-fin">Date de fin</label>
                        <input type="date" id="fo-date-fin">
                    </div>
                    <div class="form-group form-full">
                        <label for="fo-description">Description</label>
                        <textarea id="fo-description" placeholder="Description optionnelle..."></textarea>
                    </div>
                </div>
                <button type="submit" id="btn-add-formation" class="btn-primary" data-label="Ajouter">Ajouter</button>
                <div id="formation-msg" class="msg"></div>
            </form>
        </div>

        <!-- ---- Expériences ---- -->
        <div class="card">
            <h2>Expériences professionnelles</h2>
            <div id="experiences-list"></div>

            <hr class="divider">
            <form id="experience-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="ex-nom">Intitulé du poste *</label>
                        <input type="text" id="ex-nom" required maxlength="50" placeholder="Développeur Web">
                    </div>
                    <div class="form-group">
                        <label for="ex-organisme">Entreprise</label>
                        <input type="text" id="ex-organisme" maxlength="50" placeholder="Entreprise SAS">
                    </div>
                    <div class="form-group">
                        <label for="ex-date-debut">Date de début *</label>
                        <input type="date" id="ex-date-debut" required>
                    </div>
                    <div class="form-group">
                        <label for="ex-date-fin">Date de fin</label>
                        <input type="date" id="ex-date-fin">
                    </div>
                    <div class="form-group">
                        <label for="ex-lieu">Lieu</label>
                        <input type="text" id="ex-lieu" placeholder="Paris, France">
                    </div>
                    <div class="form-group form-full">
                        <label for="ex-description">Description</label>
                        <textarea id="ex-description" placeholder="Missions, technologies..."></textarea>
                    </div>
                </div>
                <button type="submit" id="btn-add-experience" class="btn-primary" data-label="Ajouter">Ajouter</button>
                <div id="experience-msg" class="msg"></div>
            </form>
        </div>

        <!-- ---- Compétences ---- -->
        <div class="card">
            <h2>Compétences</h2>
            <div id="skills-list"></div>

            <hr class="divider">
            <form id="skill-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="sk-nom">Compétence *</label>
                        <input type="text" id="sk-nom" required maxlength="100" placeholder="Python">
                    </div>
                    <div class="form-group">
                        <label for="sk-niveau">Niveau</label>
                        <input type="text" id="sk-niveau" maxlength="100" placeholder="Avancé">
                    </div>
                    <div class="form-group">
                        <label for="sk-categorie">Catégorie</label>
                        <input type="text" id="sk-categorie" maxlength="100" placeholder="Langages">
                    </div>
                </div>
                <button type="submit" id="btn-add-skill" class="btn-primary" data-label="Ajouter">Ajouter</button>
                <div id="skill-msg" class="msg"></div>
            </form>
        </div>

    </div>

</body>

</html>
